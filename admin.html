<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Spectre Records — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root{--bg:#080808;--surface:#0e0e0e;--surface2:#131318;--purple:#7c3aed;--purple-light:#a855f7;--purple-glow:#9333ea;--purple-dim:#2d1b5e;--text:#f0eaf8;--muted:#6b6378;--muted2:#4a4356;--border:#1a1625;--border2:#221e30;--green:#34d399;--yellow:#fbbf24;--red:#f87171;--gold:#C9A84C;}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;overflow-x:hidden;}
    
    /* CURSOR ORIGINAL */
    #cursor{width:8px;height:8px;background:var(--purple-light);border-radius:50%;position:fixed;pointer-events:none;z-index:9999;}
    #cursorRing{width:30px;height:30px;border:1px solid var(--purple-light);border-radius:50%;position:fixed;pointer-events:none;z-index:9998;transform:translate(-11px,-11px);opacity:.4;}

    /* LAYOUT CON BOTONES VERTICALES */
    .admin-layout{display:flex;min-height:100vh;}
    .sidebar{width:280px;background:var(--surface);border-right:1px solid var(--border2);padding:2rem;display:flex;flex-direction:column;gap:0.5rem;position:fixed;height:100vh;}
    .main-content{flex:1;margin-left:280px;padding:3rem;}

    .tab-btn{background:transparent;border:1px solid transparent;color:var(--muted);padding:1rem;text-align:left;cursor:pointer;font-family:'DM Mono';border-radius:12px;transition:0.3s;}
    .tab-btn:hover{background:var(--surface2);color:var(--text);}
    .tab-btn.active{background:var(--purple-dim);color:var(--purple-light);border-color:var(--purple);}

    /* TABLAS ORIGINALES */
    .data-table{width:100%;border-collapse:collapse;margin-top:1rem;font-family:'DM Mono';font-size:0.85rem;}
    .data-table th{text-align:left;padding:1rem;border-bottom:1px solid var(--border2);color:var(--muted);text-transform:uppercase;font-size:0.7rem;}
    .data-table td{padding:1rem;border-bottom:1px solid var(--border);color:var(--text);}

    /* DASHBOARD CARDS */
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));gap:1.5rem;margin-bottom:3rem;}
    .stat-card{background:var(--surface);padding:1.5rem;border-radius:20px;border:1px solid var(--border2);}
    .stat-val{font-family:'Bebas Neue';font-size:2.5rem;color:var(--purple-light);}
    
    /* FORMULARIOS */
    .form-box{background:var(--surface);padding:2rem;border-radius:24px;border:1px solid var(--border2);display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
    input, select, textarea{background:var(--bg);border:1px solid var(--border2);padding:1rem;border-radius:12px;color:white;font-family:'DM Mono';outline:none;}
    .full-width{grid-column: span 2;}
    .btn-save{background:var(--purple);font-weight:700;border:none;padding:1rem;border-radius:12px;cursor:pointer;}
    
    #loginScreen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:10000;}
    .tab-content{display:none;}
    .tab-content.active{display:block;}
  </style>
</head>
<body>

<div id="cursor"></div>
<div id="cursorRing"></div>

<div id="loginScreen">
  <div style="text-align:center;background:var(--surface);padding:3rem;border-radius:32px;border:1px solid var(--border2);">
    <h1 style="font-family:'Bebas Neue';font-size:3rem;margin-bottom:2rem;">SPECTRE ADMIN</h1>
    <input type="password" id="adminPass" placeholder="PASSWORD">
    <button onclick="doAdminLogin()" class="btn-save" style="width:100%;margin-top:1rem;">ENTRAR</button>
  </div>
</div>

<div id="adminScreen" class="admin-layout" style="display:none;">
  <div class="sidebar">
    <h2 style="font-family:'Bebas Neue';margin-bottom:2rem;letter-spacing:2px;">SPECTRE RECORDS</h2>
    <button class="tab-btn active" onclick="switchTab('dash', this)">DASHBOARD</button>
    <button class="tab-btn" onclick="switchTab('proyectos', this)">PROYECTOS</button>
    <button class="tab-btn" onclick="switchTab('finanzas', this)">FINANZAS</button>
    <button class="tab-btn" onclick="switchTab('nuevo', this)">+ NUEVO / EDITAR</button>
    <button class="tab-btn" onclick="iniciarOAuth()" id="oauthBtn" style="margin-top:auto;color:var(--green);">CONECTAR GOOGLE</button>
  </div>

  <div class="main-content">
    <div id="tab-dash" class="tab-content active">
      <h2 style="font-family:'Bebas Neue';font-size:3rem;margin-bottom:1rem;">REPORTE GENERAL</h2>
      <div class="stats-grid">
        <div class="stat-card">
          <div style="color:var(--muted);font-size:0.7rem;">TOTAL GENERADO</div>
          <div class="stat-val" id="statTotal">$0</div>
        </div>
        <div class="stat-card">
          <div style="color:var(--muted);font-size:0.7rem;">PROYECTOS ACTIVOS</div>
          <div class="stat-val" id="statProy">0</div>
        </div>
        <div class="stat-card">
          <div style="color:var(--muted);font-size:0.7rem;">ARTISTAS</div>
          <div class="stat-val" id="statArt">0</div>
        </div>
      </div>
    </div>

    <div id="tab-proyectos" class="tab-content">
      <h2 style="font-family:'Bebas Neue';font-size:2.5rem;">PROYECTOS</h2>
      <div id="proyectosContainer"></div>
    </div>

    <div id="tab-finanzas" class="tab-content">
      <h2 style="font-family:'Bebas Neue';font-size:2.5rem;">FINANZAS</h2>
      <div id="finanzasContainer"></div>
    </div>

    <div id="tab-nuevo" class="tab-content">
      <h2 id="formTitle" style="font-family:'Bebas Neue';font-size:2.5rem;">GESTIÓN DE DATOS</h2>
      <div class="form-box">
        <input type="text" id="fId" placeholder="ID (Auto)" readonly>
        <input type="text" id="fNombre" placeholder="Nombre / Concepto">
        <select id="fArtista"></select>
        <select id="fEstado">
          <option value="Pendiente">Pendiente</option>
          <option value="En Proceso">En Proceso</option>
          <option value="Completado">Completado</option>
        </select>
        <input type="number" id="fMonto" placeholder="Monto $">
        <div class="full-width" style="border:1px dashed var(--muted2);padding:1rem;border-radius:12px;">
          <label style="font-size:0.7rem;color:var(--muted);display:block;margin-bottom:0.5rem;">SUBIR ARCHIVO A DRIVE (Contratos/Masters)</label>
          <input type="file" id="fArchivo" style="border:none;padding:0;">
        </div>
        <textarea id="fNotas" class="full-width" placeholder="Notas..."></textarea>
        <button onclick="guardarTodo()" class="btn-save full-width">GUARDAR Y SINCRONIZAR</button>
      </div>
    </div>
  </div>
</div>

<script>
const CFG = {
  sheetId: '18-hf-2pCs1UhUUi66Ke_JmheavXk_V-Enus0p3yfNd0',
  apiKey: 'AIzaSyC6K7d8zJc2TVrchsJQeIAfHEGJ5drA74c',
  client_id: '517201895021-4q6nl7376jgag4bmrrqbo9t141n81v93.apps.googleusercontent.com'
};

let oauthToken = null;
let dataCache = { proyectos: [], artistas: [], finanzas: [] };
let editingRow = null;

// --- INICIO ---
function doAdminLogin(){
  if(document.getElementById('adminPass').value === 'heaven2025'){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('adminScreen').style.display='flex';
    loadAllData();
  }
}

function iniciarOAuth() {
  const client = google.accounts.oauth2.initTokenClient({
    client_id: CFG.client_id,
    scope: 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive.file',
    callback: (r) => { oauthToken = r.access_token; document.getElementById('oauthBtn').style.color='var(--purple-light)'; }
  });
  client.requestAccessToken();
}

// --- CARGA DE DATOS Y CÁLCULOS ---
async function loadAllData(){
  const fetchSheet = async (name) => {
    const r = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${CFG.sheetId}/values/${name}?key=${CFG.apiKey}`);
    const d = await r.json();
    if(!d.values) return [];
    const [h, ...rows] = d.values;
    return rows.map((row, i) => {
      const o = { _row: i + 2 };
      h.forEach((header, idx) => o[header.trim()] = row[idx] || '');
      return o;
    });
  };

  dataCache.artistas = await fetchSheet('Artistas');
  dataCache.proyectos = await fetchSheet('Proyectos');
  dataCache.finanzas = await fetchSheet('Finanzas');

  actualizarDashboard();
  renderTablas();
}

function actualizarDashboard(){
  // Sumar monto de Finanzas
  const total = dataCache.finanzas.reduce((acc, f) => acc + (parseFloat(f.Monto) || 0), 0);
  document.getElementById('statTotal').textContent = `$${total.toLocaleString()}`;
  document.getElementById('statProy').textContent = dataCache.proyectos.length;
  document.getElementById('statArt').textContent = dataCache.artistas.length;
  
  // Llenar select de artistas
  const sel = document.getElementById('fArtista');
  sel.innerHTML = '<option value="">Seleccionar Artista...</option>' + 
    dataCache.artistas.map(a => `<option value="${a.AKA || a.Nombre}">${a.AKA || a.Nombre}</option>`).join('');
}

// --- SUBIDA A DRIVE Y GUARDADO ---
async function uploadToDrive(file) {
  if(!oauthToken) return "";
  const metadata = { name: file.name, parents: [] }; // Se guarda en la raíz de tu Drive por defecto
  const formData = new FormData();
  formData.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
  formData.append('file', file);

  const r = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${oauthToken}` },
    body: formData
  });
  const d = await r.json();
  return d.id ? `https://drive.google.com/uc?id=${d.id}&export=download` : "";
}

async function guardarTodo(){
  if(!oauthToken) return alert("Conecta Google primero");
  
  const fileInput = document.getElementById('fArchivo');
  let fileUrl = "";
  if(fileInput.files.length > 0) {
    fileUrl = await uploadToDrive(fileInput.files[0]);
  }

  const values = [
    editingRow ? document.getElementById('fId').value : ('PR' + Date.now().toString().slice(-4)),
    document.getElementById('fNombre').value,
    document.getElementById('fArtista').value,
    "", // Servicio
    new Date().toLocaleDateString(), // Fecha
    "", "", 
    document.getElementById('fEstado').value,
    document.getElementById('fMonto').value,
    document.getElementById('fNotas').value,
    fileUrl // El enlace de Drive se guarda en la última columna
  ];

  const method = editingRow ? 'PUT' : 'POST';
  const range = editingRow ? `Proyectos!A${editingRow}:K${editingRow}` : `Proyectos!A:K:append`;
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${CFG.sheetId}/values/${range}?valueInputOption=USER_ENTERED`;

  const res = await fetch(url, {
    method: editingRow ? 'PUT' : 'POST',
    headers: { 'Authorization': `Bearer ${oauthToken}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ values: [values] })
  });

  if(res.ok) {
    alert("✓ Sincronizado");
    editingRow = null;
    loadAllData();
  }
}

// --- UI ---
function renderTablas(){
  let hP = `<table class="data-table"><thead><tr><th>ID</th><th>PROYECTO</th><th>ARTISTA</th><th>LINK</th><th>ACCION</th></tr></thead><tbody>`;
  dataCache.proyectos.forEach(p => {
    hP += `<tr><td>${p.ID}</td><td>${p['Nombre del proyecto']}</td><td>${p.Cliente}</td>
    <td>${p.Archivos ? `<a href="${p.Archivos}" target="_blank" style="color:var(--green)">Descargar</a>` : '-'}</td>
    <td><button onclick="prepareEdit(${p._row}, 'proy')" style="color:var(--purple-light);background:none;border:none;cursor:pointer;">EDITAR</button></td></tr>`;
  });
  document.getElementById('proyectosContainer').innerHTML = hP + `</tbody></table>`;
}

function prepareEdit(row, type){
  const p = dataCache.proyectos.find(x => x._row === row);
  editingRow = row;
  document.getElementById('fId').value = p.ID;
  document.getElementById('fNombre').value = p['Nombre del proyecto'];
  document.getElementById('fArtista').value = p.Cliente;
  document.getElementById('fEstado').value = p['Estado proyecto'];
  document.getElementById('fMonto').value = p['Bonos'] || 0;
  switchTab('nuevo', document.querySelector('[onclick*="nuevo"]'));
}

function switchTab(id, btn){
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
}

// CURSOR
const cur=document.getElementById('cursor'), ring=document.getElementById('cursorRing');
let mx=0, my=0, rx=0, ry=0;
document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; cur.style.left=mx+'px'; cur.style.top=my+'px'; });
(function anim(){ rx+=(mx-rx)*.15; ry+=(my-ry)*.15; ring.style.left=rx+'px'; ring.style.top=ry+'px'; requestAnimationFrame(anim); })();
</script>

</body>
</html>
